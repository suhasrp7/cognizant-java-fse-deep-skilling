<h1>{{ portalName }}</h1>

<p>Available Courses: {{ availableCourses }}</p>

<p>Search Course</p>

<input
type="text"
[(ngModel)]="searchTerm"
placeholder="Enter course name">

<p>Searching for: {{ searchTerm }}</p>

<button
[disabled]="!isPortalActive"
(click)="onEnrollClick()">

Enroll Now

</button>

<p>{{ message }}</p>

<app-notification></app-notification>
